---
# custom image details
name: ublue-gnome
description: Custom Universal Blue GNOME image by BlastPKMN

# base image
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

# module configuration, executed in order
modules:
  
  - type: script
    
    # run scripts
    scripts:
    
      - kernel-cachyos.sh

  - type: dnf
        
    # install system packages    
    install:
    
      packages:
      
        - fastfetch
        - fish
        
    # remove packages
    remove:
      
      packages:
        
        - nvtop
        - htop
        - firefox
        - firefox-langpacks

  # this sets up the proper policy and signing files for signed images to work fully
  - type: signing
