---
# custom image details
name: ublue-silverblue
description: Custom Universal Blue Silverblue image by BlastPKMN

# base image
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

# module configuration, executed in order
modules:
  
  - type: script
    
    # run scripts
    scripts:
    
      - kernel-cachyos.sh

  - type: dnf
        
    # install packages    
    install:
    
      packages:
      
        - fastfetch
        - fish
        
    # remove packages
    remove:
      
      packages:
        
        - nvtop
        - htop
        - firefox
        - firefox-langpacks
        - org.gnome.Help
        - org.freedesktop.MalcontentControl 
        - org.fedoraproject.MediaWriter
        - org.gnome.Calculator
        - org.gnome.Calendar
        - org.gnome.Characters
        - org.gnome.clocks
        - org.gnome.Connections
        - org.gnome.Contacts
        - org.gnome.font-viewer
        - org.gnome.Maps
        - org.gnome.Papers
        - org.gnome.Snapshot
        - org.gnome.Tour
        - org.gnome.Weather

  # this sets up the proper policy and signing files for signed images to work fully
  - type: signing
