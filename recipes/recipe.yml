---
name: ublue-gnome
description: This is my personal OS image.

#Base Image
base-image: ghcr.io/ublue-os/base-main
image-version: latest

#Module Configuration, Executed in Order
modules:
  - type: script
    scripts:
    - kernel-cachyos.sh

  - type: dnf
    #Install Packages
    group-install:
      with-optional: false
      packages:
        #Gnome Desktop
        - gnome-desktop
        
    install:
      packages:
        #System Packages
        - fastfetch
        - fish
        
    #Remove Packages
    remove:
      packages:
        - nvtop
        - htop

  - type: systemd
    system:
      #Enable systemd services
      enabled:
        - gdm

  #This sets up the proper policy & signing files for signed images to work fully
  - type: signing
